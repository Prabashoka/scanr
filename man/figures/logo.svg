<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 590" role="img" aria-labelledby="title desc">
  <title id="title">scanr package hex sticker</title>
  <desc id="desc">A dark hex sticker for scanr showing a time series, scan window, and change point.</desc>
  <defs>
    <clipPath id="hex-clip">
      <polygon points="256 24 468 146 468 390 256 514 44 390 44 146"/>
    </clipPath>
    <linearGradient id="scan-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4c58f" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8fd6c7" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <polygon points="256 24 468 146 468 390 256 514 44 390 44 146"
           fill="#242220" stroke="#111111" stroke-width="8" filter="url(#soft-shadow)"/>

  <g clip-path="url(#hex-clip)">
    <circle cx="106" cy="130" r="88" fill="#34302d" opacity="0.5"/>
    <circle cx="420" cy="430" r="130" fill="#2f3a38" opacity="0.55"/>
  </g>

  <text x="256" y="170"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="74"
        font-weight="700"
        fill="#f5c994">scanr</text>

  <g transform="translate(74 222)">
    <rect x="0" y="0" width="364" height="190" rx="12" fill="#1f1e1c" stroke="#6b6259" stroke-width="3"/>
    <line x1="38" y1="145" x2="330" y2="145" stroke="#8b8177" stroke-width="3" stroke-linecap="round"/>
    <line x1="38" y1="35" x2="38" y2="145" stroke="#8b8177" stroke-width="3" stroke-linecap="round"/>

    <rect x="166" y="32" width="78" height="113" rx="8" fill="url(#scan-fill)" stroke="#f4c58f" stroke-width="3"/>
    <line x1="205" y1="30" x2="205" y2="152" stroke="#f4c58f" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="8 8"/>

    <path d="M44 126
             C 62 115, 74 120, 90 111
             S 118 88, 134 94
             S 160 127, 178 118
             S 203 56, 224 58
             S 252 105, 270 98
             S 298 54, 322 44"
          fill="none"
          stroke="#8fd6c7"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M44 126
             C 62 115, 74 120, 90 111
             S 118 88, 134 94
             S 160 127, 178 118
             S 203 56, 224 58
             S 252 105, 270 98
             S 298 54, 322 44"
          fill="none"
          stroke="#1f1e1c"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.45"/>

    <circle cx="205" cy="72" r="14" fill="#242220" stroke="#f4c58f" stroke-width="6"/>
    <circle cx="205" cy="72" r="4" fill="#f4c58f"/>

    <g transform="translate(274 116)">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#f5c994" stroke-width="6"/>
      <line x1="34" y1="34" x2="55" y2="55" stroke="#f5c994" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
